esphome:
  name: anenji-v24-smg2
  friendly_name: "Onduleur Van Master (V24) - SMG2"

# ============================================================
#  VERSION B — Protocole SMG-II (registres 100-643)
#  Basé sur la doc SMG-II de jul-ienfr
#  Registres : 100-108 (fault/warning), 200-234 (mesures),
#              300-333 (contrôles), 426 (bouton), 643 (rated)
# ============================================================

# ============================================================
#  SUBSTITUTIONS (compile-time uniquement)
# ============================================================
substitutions:
  cpu_freq: "160MHz"
  logger_level: "WARN"

esp32:
  board: esp32dev
  framework:
    type: arduino
  cpu_frequency: ${cpu_freq}

# ==== WIFI ====
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  output_power: 8.5dB
  ap:
    ssid: "Anenji-SMG2-Fallback"
    password: !secret fallback_password
  power_save_mode: LIGHT

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 10min

ota:
  - platform: esphome
    password: !secret ota_password

safe_mode:
  boot_is_good_after: 120s
  num_attempts: 5

web_server:
  port: 80

time:
  - platform: sntp
    id: sntp_time
    servers:
      - 0.fr.pool.ntp.org
      - 1.fr.pool.ntp.org
      - 2.fr.pool.ntp.org

logger:
  level: ${logger_level}
  baud_rate: 0

# ==== PORT SERIE MODBUS ====
uart:
  - id: uart_bus
    tx_pin: GPIO17
    rx_pin: GPIO16
    baud_rate: 9600
    data_bits: 8
    parity: NONE
    stop_bits: 1

modbus:
  - id: modbus_hub
    uart_id: uart_bus
    send_wait_time: 200ms

modbus_controller:
  - id: anenji
    address: 0x01
    modbus_id: modbus_hub
    setup_priority: -10
    update_interval: 5s
    command_throttle: 100ms
    max_cmd_retries: 6

# ============================================================
#  MODE DEBUG / PRODUCTION (runtime via HA)
# ============================================================

# ========== CAPTEURS LECTURE ==========
sensor:
  # --- GRID (MAINS) ---
  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Mains Voltage"
    id: mains_voltage
    address: 202
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: V
    device_class: voltage
    icon: "mdi:transmission-tower"
    accuracy_decimals: 1
    lambda: "return x * 0.1;"
    filters:
      - lambda: |-
          if (x < 0 || x > 300.0) return NAN;
          return x;
      - lambda: |-
          if (id(debug_mode).state) return x;
          static float last = NAN;
          if (std::isnan(last) || std::abs(x - last) >= 1.0) {
            last = x;
            return x;
          }
          return NAN;
    on_value_range:
      - above: 260.0
        then:
          - logger.log:
              format: "ALERT: Mains overvoltage!"
              level: WARN
      - below: 190.0
        then:
          - logger.log:
              format: "ALERT: Mains undervoltage!"
              level: WARN

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Mains Frequency"
    id: mains_frequency
    address: 203
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: Hz
    device_class: frequency
    icon: "mdi:transmission-tower"
    accuracy_decimals: 2
    lambda: "return x * 0.01;"
    filters:
      - lambda: |-
          if (x < 40.0 || x > 60.0) return NAN;
          return x;
      - lambda: |-
          if (id(debug_mode).state) return x;
          static float last = NAN;
          if (std::isnan(last) || std::abs(x - last) >= 0.1) {
            last = x;
            return x;
          }
          return NAN;

  - platform: modbus_controller
