              level: WARN

  # --- BATTERIE - CAPTEURS CALCULES ---
  - platform: template
    name: "Discharging Power"
    id: discharging_power
    unit_of_measurement: W
    device_class: power
    icon: "mdi:battery-arrow-down"
    lambda: |-
      float p = id(battery_power).state;
      if (std::isnan(p) || p >= 0) return 0.0;
      return -p;
    update_interval: 5s

  - platform: template
    name: "Charging Power"
    id: charging_power
    unit_of_measurement: W
    device_class: power
    icon: "mdi:battery-arrow-up"
    lambda: |-
      float p = id(battery_power).state;
      if (std::isnan(p) || p <= 0) return 0.0;
      return p;
    update_interval: 5s

  - platform: template
    name: "Battery Autonomy"
    id: battery_autonomy
    unit_of_measurement: "min"
    icon: "mdi:timer-sand"
    lambda: |-
      float soc = id(battery_soc).state;
      float power = id(battery_power).state;
      float capacity_wh = id(battery_capacity).state;
      if (std::isnan(soc) || std::isnan(power) || power >= 0 || std::isnan(capacity_wh)) return NAN;
      float remaining_wh = (soc / 100.0) * capacity_wh;
      float hours = remaining_wh / (-power);
      return hours * 60.0;
    update_interval: 30s

  # --- SOLAIRE - ENERGY ---
  - platform: total_daily_energy
    name: "PV Energy Today"
    id: pv_energy_today
    power_id: pv_power
    filters:
      - multiply: 0.001
    unit_of_measurement: kWh
    device_class: energy
    icon: "mdi:solar-panel"
    restore: true

  # --- DIAGNOSTICS ---
  - platform: uptime
    name: "Uptime"
    id: uptime_sensor
    update_interval: 60s

  - platform: template
    name: "Modbus Error Count"
    id: modbus_error_count
    icon: "mdi:alert-circle"
    update_interval: 5s
    lambda: |-
      static bool last_error = false;
      static int count = 0;
      bool current_error = id(anenji).status_has_error();
      if (current_error && !last_error) {
        count++;
      }
      last_error = current_error;
      return count;

  # --- RATED POWER (diag) ---
  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Rated Power"
    id: rated_power
    address: 643
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: W
    device_class: power
    entity_category: diagnostic
    icon: "mdi:information"

# ========== TEXT SENSORS ==========
text_sensor:
  - platform: template
    name: "Modbus Status"
    update_interval: 5s
    lambda: |-
      if (id(anenji).status_has_error()) {
        return std::string("Error");
      }
      return std::string("Connected");

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Operation Mode"
    id: operation_mode
    address: 201
    register_type: holding
    value_type: U_WORD
    icon: "mdi:state-machine"
    lambda: |-
      switch (x) {
        case 0: return std::string("Power On");
        case 1: return std::string("Standby");
        case 2: return std::string("Line");
        case 3: return std::string("Battery");
        case 4: return std::string("PV");
        case 5: return std::string("Charging");
        case 6: return std::string("PV + Battery");
        default: {
          char buf[16];
          snprintf(buf, sizeof(buf), "Unknown (%u)", x);
          return std::string(buf);
        }
      }
    filters:
      - lambda: |-
          if (x > 20) return NAN;
          return x;

  # --- FAULT / WARNING CODES ---
  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Fault Code Raw"
    id: fault_code_raw
    address: 100
    register_type: holding
    response_size: 4
    raw_encode: HEXBYTES
    update_interval: 30s

  - platform: template
    name: "Fault Code"
    id: fault_code
    lambda: |-
      std::string raw = id(fault_code_raw).state;
      if (raw.empty() || raw == "nan") return std::string("N/A");
      uint32_t code = 0;
      try {
        code = std::stoul(raw, nullptr, 16);
      } catch (...) {
        return std::string("Parse error");
      }
      if (code == 0) return std::string("OK");
      std::string faults;
      const char* fault_names[] = {
        "Overtemp inverter", "Overtemp DCDC", "Battery overvoltage",
        "PV overtemp", "Output short circuit", "Inverter overvoltage",
        "Output overload", "Bus overvoltage", "Bus soft start timeout",
        "PV overcurrent", "PV overvoltage", "Battery overcurrent",
        "Inverter overcurrent", "Bus low voltage", "Reserve",
        "DC component too high", "Reserve", "Output current zero bias",
        "Inverter current zero bias", "Battery current zero bias",
        "PV current zero bias", "Inverter low voltage",
        "Inverter negative power", "Parallel host lost",
        "Parallel sync abnormal", "Battery type incompatible",
        "Parallel version incompatible"
      };
      for (int i = 0; i < 27; i++) {
        if (code & (1 << i)) {
          if (!faults.empty()) faults += "; ";
          faults += fault_names[i];
        }
      }
      return faults;
    update_interval: 30s

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Warning Code Raw"
    id: warning_code_raw
    address: 108
    register_type: holding
    response_size: 4
    raw_encode: HEXBYTES
    update_interval: 30s

  - platform: template
    name: "Warning Code"
    id: warning_code
    lambda: |-
      std::string raw = id(warning_code_raw).state;
      if (raw.empty() || raw == "nan") return std::string("N/A");
      uint32_t code = 0;
      try {
        code = std::stoul(raw, nullptr, 16);
      } catch (...) {
        return std::string("Parse error");
      }
      if (code == 0) return std::string("OK");
      std::string warnings;
      const char* warn_names[] = {
        "Reserve", "Mains waveform abnormal", "Reserve",
        "Mains low voltage", "Mains over frequency", "Mains low frequency",
        "PV low voltage", "Over temperature", "Battery low voltage",
        "Battery not connected", "Overload", "Battery Eq charging",
        "Battery undervoltage", "Output power derating", "Fan blocked",
        "PV energy too low", "Parallel comm interrupted",
        "Output mode inconsistent", "Parallel battery voltage diff"
      };
      for (int i = 0; i < 19; i++) {
        if (code & (1 << i)) {
          if (!warnings.empty()) warnings += "; ";
          warnings += warn_names[i];
        }
      }
      return warnings;
    update_interval: 30s

# ========== CONTROLES ==========
number:
  # --- MODE DEBUG / PRODUCTION ---
  - platform: template
    name: "Debug Mode"
    id: debug_mode
    optimistic: true
    min_value: 0
    max_value: 1
    step: 1
    initial_value: 0
    mode: slider
    icon: "mdi:bug"
    restore_value: true
    on_value:
      then:
        - lambda: |-
            if (id(debug_mode).state > 0.5) {
              ESP_LOGW("mode", "=== DEBUG MODE ACTIVE ===");
              id(anenji).set_update_interval(5000);
              ESP_LOGW("mode", "Modbus: 5s | Delta: OFF | skip: 0");
            } else {
              ESP_LOGW("mode", "=== MODE PRODUCTION ===");
              id(anenji).set_update_interval(10000);
              ESP_LOGW("mode", "Modbus: 10s | Delta: 0.5V | skip: 1");
            }

  - platform: template
    name: "Battery Capacity"
    id: battery_capacity
    optimistic: true
    min_value: 1000
    max_value: 10000
    step: 100
    initial_value: 4800
    unit_of_measurement: "Wh"
    mode: slider
    icon: "mdi:battery"
    restore_value: true

