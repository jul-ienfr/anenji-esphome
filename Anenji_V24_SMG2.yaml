    icon: "mdi:thermometer"
    lambda: "return x * 0.1;"
    filters:
      - lambda: |-
          if (x < -20.0 || x > 100.0) return NAN;
          return x;
      - sliding_window_moving_average:
          window_size: 5
          send_every: 5
    on_value_range:
      - above: 65.0
        then:
          - logger.log:
              format: "ALERT: DCDC temperature too high!"
              level: WARN

