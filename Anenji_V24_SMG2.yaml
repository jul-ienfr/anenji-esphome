    max_value: 32.0
    step: 0.1
    unit_of_measurement: V
    mode: box
    entity_category: config
    icon: "mdi:battery-alert"
    lambda: "return x * 0.1;"
    write_lambda: |-
      uint16_t val = (uint16_t)(x * 10);
      payload.push_back(val >> 8);
      payload.push_back(val & 0xFF);
