esphome:
  name: anenji-v24
  friendly_name: "Onduleur Van Master (V24)"
  min_version: "2025.12.1"

# ============================================================
#  VERSION A — Registres actuels (200-264) ENRICHS
#  Basé sur le YAML original de julie
#  Registres à tester : 100, 108, 217, 220, 226, 643
# ============================================================

# ============================================================
#  SUBSTITUTIONS (compile-time uniquement)
# ============================================================
substitutions:
  cpu_freq: "160MHz"
  logger_level: "WARN"

esp32:
  board: esp32dev
  framework:
    type: arduino
  cpu_frequency: ${cpu_freq}

# ==== WIFI ====
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  output_power: 8.5dB
  ap:
    ssid: "Anenji-Fallback"
    password: !secret fallback_password
  power_save_mode: LIGHT

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 10min

ota:
  - platform: esphome
    password: !secret ota_password

safe_mode:
  boot_is_good_after: 120s
  num_attempts: 5

web_server:
  port: 80

time:
  - platform: sntp
    id: sntp_time
    servers:
      - 0.fr.pool.ntp.org
      - 1.fr.pool.ntp.org
      - 2.fr.pool.ntp.org

logger:
  level: ${logger_level}
  baud_rate: 0

# ==== PORT SERIE MODBUS ====
uart:
  - id: uart_bus
    tx_pin: GPIO17
    rx_pin: GPIO16
    baud_rate: 9600
    data_bits: 8
    parity: NONE
    stop_bits: 1

modbus:
  - id: modbus_hub
    uart_id: uart_bus
    send_wait_time: 200ms

modbus_controller:
  - id: anenji
    address: 0x01
    modbus_id: modbus_hub
    setup_priority: -10
    update_interval: 5s
    command_throttle: 100ms
    max_cmd_retries: 6

# ============================================================
#  MODE DEBUG / PRODUCTION (runtime via HA)
# ============================================================

# ========== CAPTEURS LECTURE ==========
sensor:
  # --- BATTERIE ---
  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Battery Voltage"
    id: battery_voltage
    address: 215
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: V
    device_class: voltage
    accuracy_decimals: 2
    icon: "mdi:battery"
    lambda: "return x * 0.1;"
    filters:
      - lambda: |-
          if (x < 15.0 || x > 35.0) return NAN;
          return x;
      - lambda: |-
          if (id(debug_mode).state) return x;
          static float last = NAN;
          if (std::isnan(last) || std::abs(x - last) >= 0.5) {
            last = x;
            return x;
          }
          return NAN;
    on_value_range:
      - above: 30.0
        then:
          - logger.log:
              format: "ALERT: Battery voltage too high!"
              level: WARN
      - below: 21.0
        then:
          - logger.log:
              format: "ALERT: Battery voltage too low!"
              level: WARN

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Battery Current"
    id: battery_current
    address: 216
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: A
    device_class: current
    accuracy_decimals: 1
    icon: "mdi:current-ac"
    lambda: "return x * 0.1;"
    filters:
      - lambda: |-
          if (x < -150.0 || x > 150.0) return NAN;
          return x;
      - lambda: |-
          if (id(debug_mode).state) return x;
          static float last = NAN;
          if (std::isnan(last) || std::abs(x - last) >= 0.5) {
            last = x;
            return x;
          }
          return NAN;

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Battery SOC"
    id: battery_soc
    address: 229
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "%"
    device_class: battery
    icon: "mdi:battery-half"
    filters:
      - lambda: |-
          if (x < 0 || x > 100) return NAN;
          return x;
    on_value_range:
      - below: 20
        then:
          - logger.log:
              format: "ALERT: Battery SOC below 20%!"
              level: WARN
      - below: 10
        then:
          - logger.log:
              format: "CRITICAL: Battery SOC below 10%!"
              level: ERROR

  # --- BATTERIE - CAPTEURS CALCULES ---
  - platform: template
    name: "Battery Power"
    id: battery_power
    unit_of_measurement: "W"
    device_class: power
    icon: "mdi:battery-charging"
    lambda: |-
      float v = id(battery_voltage).state;
      float a = id(battery_current).state;
      if (std::isnan(v) || std::isnan(a)) return NAN;
      return v * a;
    update_interval: 5s
    filters:
      - lambda: |-
          if (id(debug_mode).state) return x;
          static float last = NAN;
          if (std::isnan(last) || std::abs(x - last) >= 5.0) {
            last = x;
            return x;
          }
          return NAN;

  - platform: template
    name: "Discharging Power"
    id: discharging_power
    unit_of_measurement: W
    device_class: power
    icon: "mdi:battery-arrow-down"
    lambda: |-
      float p = id(battery_power).state;
      if (std::isnan(p) || p >= 0) return 0.0;
      return -p;
    update_interval: 5s

  - platform: template
    name: "Charging Power"
    id: charging_power
    unit_of_measurement: W
    device_class: power
    icon: "mdi:battery-arrow-up"
    lambda: |-
      float p = id(battery_power).state;
      if (std::isnan(p) || p <= 0) return 0.0;
      return p;
    update_interval: 5s

  - platform: template
    name: "Battery Autonomy"
    id: battery_autonomy
    unit_of_measurement: "min"
    icon: "mdi:timer-sand"
    lambda: |-
      float soc = id(battery_soc).state;
      float power = id(battery_power).state;
      float capacity_wh = id(battery_capacity).state;
      if (std::isnan(soc) || std::isnan(power) || power <= 0 || std::isnan(capacity_wh)) return NAN;
      float remaining_wh = (soc / 100.0) * capacity_wh;
      float hours = remaining_wh / power;
      return hours * 60.0;
    update_interval: 30s

  # --- SOLAIRE ---
  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "PV Voltage"
    id: pv_voltage
    address: 263
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: V
    device_class: voltage
    icon: "mdi:solar-panel"
    lambda: "return x * 0.1;"
    filters:
      - lambda: |-
          if (x < 0 || x > 100.0) return NAN;
          return x;
      - lambda: |-
          if (id(debug_mode).state) return x;
          static float last = NAN;
          if (std::isnan(last) || std::abs(x - last) >= 0.5) {
            last = x;
            return x;
          }
          return NAN;

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "PV Power"
    id: pv_power
    address: 264
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: W
    device_class: power
    icon: "mdi:solar-panel"
    filters:
      - lambda: |-
          if (x > 10000) return NAN;
          return x;
      - lambda: |-
          if (id(debug_mode).state) return x;
          static float last = NAN;
          if (std::isnan(last) || std::abs(x - last) >= 10.0) {
            last = x;
            return x;
          }
          return NAN;

  - platform: template
    name: "PV Current"
    id: pv_current
    unit_of_measurement: "A"
    device_class: current
    icon: "mdi:solar-panel"
    lambda: |-
      float v = id(pv_voltage).state;
      float p = id(pv_power).state;
      if (std::isnan(v) || std::isnan(p) || v < 1.0) return NAN;
      return p / v;
    update_interval: 5s

  # --- SOLAIRE - ENERGY ---
  - platform: total_daily_energy
    name: "PV Energy Today"
    id: pv_energy_today
    power_id: pv_power
    filters:
      - multiply: 0.001
    unit_of_measurement: kWh
    device_class: energy
    icon: "mdi:solar-panel"
    restore: true

  # --- GRID (CAMPING) ---
  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Grid Voltage"
    address: 200
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: V
    device_class: voltage
    icon: "mdi:transmission-tower"
    lambda: "return x * 0.1;"
    filters:
      - lambda: |-
          if (x < 0 || x > 300.0) return NAN;
          return x;
      - lambda: |-
          if (id(debug_mode).state) return x;
          static float last = NAN;
          if (std::isnan(last) || std::abs(x - last) >= 1.0) {
            last = x;
            return x;
          }
          return NAN;

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Grid Frequency"
    address: 201
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: Hz
    device_class: frequency
    icon: "mdi:transmission-tower"
    lambda: "return x * 0.01;"
    filters:
      - lambda: |-
          if (x < 40.0 || x > 60.0) return NAN;
          return x;

  # --- AC OUT (SORTIE 220V) ---
  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "AC Output Voltage"
    address: 202
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: V
    device_class: voltage
    icon: "mdi:power-plug"
    lambda: "return x * 0.1;"
    filters:
      - lambda: |-
          if (x < 0 || x > 300.0) return NAN;
          return x;
      - lambda: |-
          if (id(debug_mode).state) return x;
          static float last = NAN;
          if (std::isnan(last) || std::abs(x - last) >= 1.0) {
            last = x;
            return x;
          }
          return NAN;

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "AC Output Power"
    address: 213
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: W
    device_class: power
    icon: "mdi:power-plug"
    filters:
      - lambda: |-
          if (x > 10000) return NAN;
          return x;
      - lambda: |-
          if (id(debug_mode).state) return x;
          static float last = NAN;
          if (std::isnan(last) || std::abs(x - last) >= 10.0) {
            last = x;
            return x;
          }
          return NAN;

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "AC Output Load"
    address: 214
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "%"
    icon: "mdi:percent"
    filters:
      - lambda: |-
          if (x > 100) return NAN;
          return x;

  # --- TEMPERATURE ---
  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Inverter Temperature"
    id: inverter_temp
    address: 227
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "°C"
    device_class: temperature
    icon: "mdi:thermometer"
    lambda: "return x * 0.1;"
    filters:
      - lambda: |-
          if (x < -20.0 || x > 80.0) return NAN;
          return x;
      - sliding_window_moving_average:
          window_size: 5
          send_every: 5
    on_value_range:
      - above: 60.0
        then:
          - logger.log:
              format: "ALERT: Inverter temperature too high!"
              level: WARN

  # --- A TESTER : Registres supplementaires ---
  # Si ces capteurs retournent NAN, les supprimer du YAML

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "DCDC Temperature"
    id: dcdc_temp
    address: 226
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "°C"
    device_class: temperature
    icon: "mdi:thermometer"
    lambda: "return x * 0.1;"
    filters:
      - lambda: |-
          if (x < -20.0 || x > 80.0) return NAN;
          return x;
      - sliding_window_moving_average:
          window_size: 5
          send_every: 5
    on_value_range:
      - above: 65.0
        then:
          - logger.log:
              format: "ALERT: DCDC temperature too high!"
              level: WARN

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Battery Power Direct"
    id: battery_power_direct
    address: 217
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: W
    device_class: power
    icon: "mdi:battery-charging"
    filters:
      - lambda: |-
          if (x < -5000 || x > 5000) return NAN;
          return x;

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "PV Current Direct"
    id: pv_current_direct
    address: 220
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: A
    device_class: current
    lambda: "return x * 0.1;"
    filters:
      - lambda: |-
          if (x < 0 || x > 50.0) return NAN;
          return x;

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Rated Power"
    id: rated_power
    address: 643
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: W
    device_class: power
    entity_category: diagnostic
    icon: "mdi:information"

  # --- DIAGNOSTICS ---
  - platform: uptime
    name: "Uptime"
    id: uptime_sensor
    update_interval: 60s

  - platform: template
    name: "Modbus Error Count"
    id: modbus_error_count
    icon: "mdi:alert-circle"
    update_interval: 5s
    lambda: |-
      static bool last_error = false;
      static int count = 0;
      bool current_error = id(anenji).status_has_error();
      if (current_error && !last_error) {
        count++;
      }
      last_error = current_error;
      return count;

# ========== CONTROLES ==========
number:
  - platform: template
    name: "Debug Mode"
    id: debug_mode
    optimistic: true
    min_value: 0
    max_value: 1
    step: 1
    initial_value: 0
    mode: slider
    icon: "mdi:bug"
    restore_value: true
    on_value:
      then:
        - lambda: |-
            if (id(debug_mode).state > 0.5) {
              ESP_LOGW("mode", "=== DEBUG MODE ACTIVE ===");
              id(anenji).set_update_interval(5000);
              ESP_LOGW("mode", "Modbus: 5s | Delta: OFF | skip: 0");
            } else {
              ESP_LOGW("mode", "=== MODE PRODUCTION ===");
              id(anenji).set_update_interval(10000);
              ESP_LOGW("mode", "Modbus: 10s | Delta: 0.5V | skip: 1");
            }

  - platform: template
    name: "Battery Capacity"
    id: battery_capacity
    optimistic: true
    min_value: 1000
    max_value: 10000
    step: 100
    initial_value: 4800
    unit_of_measurement: "Wh"
    mode: slider
    icon: "mdi:battery"
    restore_value: true

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Max Charge Current"
    address: 252
    register_type: holding
    value_type: U_WORD
    min_value: 10
    max_value: 120
    step: 10
    unit_of_measurement: A
    mode: slider
    entity_category: config

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Max Grid Charge Current"
    address: 250
    register_type: holding
    value_type: U_WORD
    min_value: 2
    max_value: 80
    step: 2
    unit_of_measurement: A
    mode: slider
    entity_category: config

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Bulk Charge Voltage"
    address: 254
    register_type: holding
    value_type: U_WORD
    min_value: 24.0
    max_value: 30.0
    step: 0.1
    unit_of_measurement: V
    mode: box
    entity_category: config
    lambda: "return x * 0.1;"
    write_lambda: |-
      uint16_t val = (uint16_t)(x * 10);
      payload.push_back(val >> 8);
      payload.push_back(val & 0xFF);
      return true;

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Float Charge Voltage"
    address: 255
    register_type: holding
    value_type: U_WORD
    min_value: 24.0
    max_value: 30.0
    step: 0.1
    unit_of_measurement: V
    mode: box
    entity_category: config
    lambda: "return x * 0.1;"
    write_lambda: |-
      uint16_t val = (uint16_t)(x * 10);
      payload.push_back(val >> 8);
      payload.push_back(val & 0xFF);
      return true;

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Low DC Cut-off Voltage"
    address: 258
    register_type: holding
    value_type: U_WORD
    min_value: 20.0
    max_value: 24.0
    step: 0.1
    unit_of_measurement: V
    mode: box
    entity_category: config
    lambda: "return x * 0.1;"
    write_lambda: |-
      uint16_t val = (uint16_t)(x * 10);
      payload.push_back(val >> 8);
      payload.push_back(val & 0xFF);
      return true;

select:
  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Output Source Priority"
    address: 256
    value_type: U_WORD
    optionsmap:
      Utility First: 0
      Solar First: 1
      SBU Priority: 2
    entity_category: config

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Charger Source Priority"
    address: 257
    value_type: U_WORD
    optionsmap:
      Solar First: 0
      Solar + Utility: 1
      Solar Only: 2
      Utility Only: 3
    entity_category: config

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Battery Type"
    address: 253
    value_type: U_WORD
    optionsmap:
      AGM: 0
      Flooded: 1
      User Defined: 2
      Pylontech: 3
    entity_category: config

switch:
  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Buzzer"
    address: 259
    register_type: holding
    bitmask: 0x04
    entity_category: config

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Power Saving Mode"
    address: 259
    register_type: holding
    bitmask: 0x01
    entity_category: config

# ========== DIAGNOSTICS ==========
text_sensor:
  - platform: template
    name: "Modbus Status"
    update_interval: 5s
    lambda: |-
      if (id(anenji).status_has_error()) {
        return std::string("Error");
      }
      return std::string("Connected");

  # --- A TESTER : Fault/Warning codes ---
  # Si ces capteurs retournent des valeurs, c'est que le protocole
  # supporte aussi les registres 100/108. Sinon, les supprimer.

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Fault Code Raw"
    id: fault_code_raw
    address: 100
    register_type: holding
    response_size: 4
    raw_encode: HEXBYTES
    update_interval: 30s

  - platform: template
    name: "Fault Code"
    id: fault_code
    lambda: |-
      std::string raw = id(fault_code_raw).state;
      if (raw.empty() || raw == "nan") return std::string("N/A");
      // Parse hex string to uint32
      uint32_t code = 0;
      try {
        code = std::stoul(raw, nullptr, 16);
      } catch (...) {
        return std::string("Parse error");
      }
      if (code == 0) return std::string("OK");
      std::string faults;
      const char* fault_names[] = {
        "Overtemp inverter", "Overtemp DCDC", "Battery overvoltage",
        "PV overtemp", "Output short circuit", "Inverter overvoltage",
        "Output overload", "Bus overvoltage", "Bus soft start timeout",
        "PV overcurrent", "PV overvoltage", "Battery overcurrent",
        "Inverter overcurrent", "Bus low voltage", "Reserve",
        "DC component too high", "Reserve", "Output current zero bias",
        "Inverter current zero bias", "Battery current zero bias",
        "PV current zero bias", "Inverter low voltage",
        "Inverter negative power", "Parallel host lost",
        "Parallel sync abnormal", "Battery type incompatible",
        "Parallel version incompatible"
      };
      for (int i = 0; i < 27; i++) {
        if (code & (1 << i)) {
          if (!faults.empty()) faults += "; ";
          faults += fault_names[i];
        }
      }
      return faults;
    update_interval: 30s

  - platform: modbus_controller
    modbus_controller_id: anenji
    name: "Warning Code Raw"
    id: warning_code_raw
    address: 108
    register_type: holding
    response_size: 4
    raw_encode: HEXBYTES
    update_interval: 30s

  - platform: template
    name: "Warning Code"
    id: warning_code
    lambda: |-
      std::string raw = id(warning_code_raw).state;
      if (raw.empty() || raw == "nan") return std::string("N/A");
      uint32_t code = 0;
      try {
        code = std::stoul(raw, nullptr, 16);
      } catch (...) {
        return std::string("Parse error");
      }
      if (code == 0) return std::string("OK");
      std::string warnings;
      const char* warn_names[] = {
        "Reserve", "Mains waveform abnormal", "Reserve",
        "Mains low voltage", "Mains over frequency", "Mains low frequency",
        "PV low voltage", "Over temperature", "Battery low voltage",
        "Battery not connected", "Overload", "Battery Eq charging",
        "Battery undervoltage", "Output power derating", "Fan blocked",
        "PV energy too low", "Parallel comm interrupted",
        "Output mode inconsistent", "Parallel battery voltage diff"
      };
      for (int i = 0; i < 19; i++) {
        if (code & (1 << i)) {
          if (!warnings.empty()) warnings += "; ";
          warnings += warn_names[i];
        }
      }
      return warnings;
    update_interval: 30s

binary_sensor:
  - platform: status
    name: "Device Online"
    id: device_status

# ========== LED STATUS ==========
output:
  - platform: ledc
    pin: GPIO2
    id: led_output
    frequency: 1Hz

light:
  - platform: monochromatic
    output: led_output
    name: "Status LED"
    id: status_led
